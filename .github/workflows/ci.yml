name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION="0.1.0-ci.${{ github.run_number }}"
          dotnet pack DeltaStreamNet.Annotations/DeltaStreamNet.Annotations.csproj -c Release --no-build -p:PackageVersion=$VERSION
          dotnet pack DeltaStreamNet/DeltaStreamNet.csproj -c Release --no-build -p:PackageVersion=$VERSION
          dotnet pack DeltaStreamNet.Protobuf/DeltaStreamNet.Protobuf.csproj -c Release --no-build -p:PackageVersion=$VERSION

      - name: Push to GitHub Packages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: >
          dotnet nuget push **/*.nupkg
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
